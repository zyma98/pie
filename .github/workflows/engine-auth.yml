name: Test Engine Auth

on:
  pull_request:
    branches: [ main ]

jobs:
  build-engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Protobuf Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build Engine
        working-directory: ./pie
        run: cargo build --release

      - name: Upload pie binary
        uses: actions/upload-artifact@v3
        with:
          name: pie-binary
          path: pie/target/release/pie
          retention-days: 1

  build-client-cli:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Protobuf Compiler

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build Client CLI
        working-directory: ./client/cli
        run: cargo build --release

      - name: Upload pie-cli binary
        uses: actions/upload-artifact@v3
        with:
          name: pie-cli-binary
          path: client/cli/target/release/pie-cli
          retention-days: 1

  test:
    needs: [build-engine, build-client-cli]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Download pie binary
        uses: actions/download-artifact@v3
        with:
          name: pie-binary
          path: ./bin

      - name: Download pie-cli binary
        uses: actions/download-artifact@v3
        with:
          name: pie-cli-binary
          path: ./bin

      - name: Make binaries executable
        run: |
          chmod +x ./bin/pie
          chmod +x ./bin/pie-cli

      - name: Add binaries to PATH
        run: |
          echo "$(pwd)/bin" >> $GITHUB_PATH

      - name: Run key algorithm test
        run: ./tests/engine/auth/key_algorithm.sh
